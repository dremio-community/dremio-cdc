[pytest]
markers =
    integration: requires local docker-compose services (postgres, minio, iceberg-rest)
    cloud: requires Dremio Cloud credentials and network access
    ui: requires the CDC UI backend running on port 5050
    oracle: requires docker-compose oracle + debezium-oracle services (gvenzl/oracle-xe:21-slim)
    snowflake: requires Snowflake trial account credentials and network access
    mariadb: requires docker-compose mariadb service on port 3307
    cockroachdb: requires docker-compose cockroachdb service on port 26257
    db2: requires docker-compose db2 + debezium-db2 services (ibmcom/db2:11.5.8.0, port 50000/8767)
    spanner: requires docker-compose spanner-emulator service (gcr.io/cloud-spanner-emulator/emulator, ports 9010/9020)
    pubsub: requires docker-compose pubsub-emulator service (gcr.io/google.com/cloudsdktool/google-cloud-cli:slim, port 8085)
