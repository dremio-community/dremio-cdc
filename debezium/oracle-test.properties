# Debezium Server — Oracle connector for docker-compose test environment
# Used by the debezium-oracle service in docker-compose.yml.
# DO NOT use in production — use oracle.properties as the template instead.

# ── Sink: HTTP to CDC daemon on the host ──────────────────────────────────────
debezium.sink.type=http
debezium.sink.http.url=http://host.docker.internal:8765/events
debezium.sink.http.timeout.ms=10000
debezium.sink.http.retries=5

# ── Payload format (required by Debezium 2.6) ─────────────────────────────────
debezium.format.value=json
debezium.format.key=json

# ── Oracle XE source ──────────────────────────────────────────────────────────
debezium.source.connector.class=io.debezium.connector.oracle.OracleConnector
debezium.source.name=oracle-test
debezium.source.topic.prefix=oracle-cdc

debezium.source.database.hostname=oracle
debezium.source.database.port=1521
debezium.source.database.user=c##dbzuser
debezium.source.database.password=dbzpass
debezium.source.database.dbname=FREE
debezium.source.database.pdb.name=FREEPDB1
debezium.source.database.connection.adapter=logminer

# Capture CDC_TEST.EMPLOYEES in XEPDB1
debezium.source.table.include.list=CDC_TEST.EMPLOYEES

# Snapshot only when no offset file exists (setup_class wipes the offset file before restart)
debezium.source.snapshot.mode=initial

# ── Offset + schema history ───────────────────────────────────────────────────
debezium.source.offset.storage=org.apache.kafka.connect.storage.FileOffsetBackingStore
debezium.source.offset.storage.file.filename=/debezium/data/oracle-test-offsets.dat
debezium.source.offset.flush.interval.ms=5000

debezium.source.schema.history.internal=io.debezium.storage.file.history.FileSchemaHistory
debezium.source.schema.history.internal.file.filename=/debezium/data/oracle-test-schema-history.dat

# ── LogMiner ──────────────────────────────────────────────────────────────────
debezium.source.log.mining.batch.size.max=10000
debezium.source.log.mining.sleep.time.max.ms=2000
debezium.source.log.mining.strategy=online_catalog

# ── Payload ───────────────────────────────────────────────────────────────────
debezium.source.tombstones.on.delete=false
# Serialize Oracle NUMBER as decimal string (not binary VariableScaleDecimal)
debezium.source.decimal.handling.mode=string

# Heartbeat every 15s so the test can detect when Debezium is connected
debezium.source.heartbeat.interval.ms=15000
