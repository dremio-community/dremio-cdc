# ─────────────────────────────────────────────────────────────────────────────
# Debezium Server — SQL Server connector
# ─────────────────────────────────────────────────────────────────────────────
# Usage:
#   docker run --rm --name debezium-sqlserver \
#     -p 8766:8766 \
#     -v $(pwd)/debezium/sqlserver.properties:/debezium/conf/application.properties \
#     debezium/server:3.0.0.Final
#
# SQL Server prerequisites (run as sysadmin):
#   -- Enable SQL Server Agent (required for CDC cleanup jobs):
#   EXEC sp_configure 'show advanced options', 1; RECONFIGURE;
#   EXEC sp_configure 'Agent XPs', 1; RECONFIGURE;
#
#   -- Enable CDC at the database level:
#   USE mydb;
#   EXEC sys.sp_cdc_enable_db;
#
#   -- Enable CDC per table:
#   EXEC sys.sp_cdc_enable_table
#     @source_schema = 'dbo',
#     @source_name   = 'customers',
#     @role_name     = NULL;   -- or a specific role to restrict access
#
# Note: Use this Debezium adapter instead of the native sources/sqlserver.py
# if you need Kafka-based offset management or multi-host HA deployments.
# For simple single-host setups, sources/sqlserver.py is simpler.
# ─────────────────────────────────────────────────────────────────────────────

debezium.sink.type=http

# Format (required by Debezium 2.6+)
debezium.format.value=json
debezium.format.key=json
debezium.sink.http.url=http://host.docker.internal:8766/events
debezium.sink.http.timeout.ms=5000
debezium.sink.http.retries=3

debezium.source.connector.class=io.debezium.connector.sqlserver.SqlServerConnector
debezium.source.name=sqlserver-cdc
debezium.source.topic.prefix=sqlserver-cdc

debezium.source.database.hostname=YOUR_SQLSERVER_HOST
debezium.source.database.port=1433
debezium.source.database.user=sa
debezium.source.database.password=YOUR_SA_PASSWORD
debezium.source.database.names=mydb

debezium.source.table.include.list=mydb.dbo.customers,mydb.dbo.orders

debezium.source.snapshot.mode=initial

debezium.source.offset.storage=org.apache.kafka.connect.storage.FileOffsetBackingStore
debezium.source.offset.storage.file.filename=/debezium/data/sqlserver-offsets.dat
debezium.source.offset.flush.interval.ms=10000

debezium.source.schema.history.internal=io.debezium.storage.file.history.FileSchemaHistory
debezium.source.schema.history.internal.file.filename=/debezium/data/sqlserver-schema-history.dat

debezium.source.tombstones.on.delete=false
debezium.source.poll.interval.ms=1000
debezium.source.heartbeat.interval.ms=30000
