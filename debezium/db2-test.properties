# Debezium Server — IBM Db2 connector for docker-compose test environment
# Used by the debezium-db2 service in docker-compose.yml.

# ── Sink: HTTP to CDC daemon on the host ──────────────────────────────────────
debezium.sink.type=http
debezium.sink.http.url=http://host.docker.internal:8767/events
debezium.sink.http.timeout.ms=10000
debezium.sink.http.retries=5

# ── Payload format ────────────────────────────────────────────────────────────
debezium.format.value=json
debezium.format.key=json

# ── IBM Db2 source ────────────────────────────────────────────────────────────
debezium.source.connector.class=io.debezium.connector.db2.Db2Connector
debezium.source.name=db2-test
debezium.source.topic.prefix=db2-cdc

debezium.source.database.hostname=db2
debezium.source.database.port=50000
debezium.source.database.user=db2inst1
debezium.source.database.password=db2pass
debezium.source.database.dbname=TESTDB

# Capture the employees table
debezium.source.table.include.list=DB2INST1.EMPLOYEES

# Snapshot on first start; offset file wipe forces re-snapshot between test runs
debezium.source.snapshot.mode=initial

# Serialize DECIMAL as string (avoids base64 bytes)
debezium.source.decimal.handling.mode=string

# ── Offset + schema history ───────────────────────────────────────────────────
debezium.source.offset.storage=org.apache.kafka.connect.storage.FileOffsetBackingStore
debezium.source.offset.storage.file.filename=/debezium/data/db2-test-offsets.dat
debezium.source.offset.flush.interval.ms=5000

debezium.source.schema.history.internal=io.debezium.storage.file.history.FileSchemaHistory
debezium.source.schema.history.internal.file.filename=/debezium/data/db2-test-schema-history.dat

# ── Misc ──────────────────────────────────────────────────────────────────────
debezium.source.tombstones.on.delete=false
debezium.source.heartbeat.interval.ms=15000
