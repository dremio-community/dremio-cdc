# ─────────────────────────────────────────────────────────────────────────────
# Debezium Server — Oracle LogMiner connector
# ─────────────────────────────────────────────────────────────────────────────
# Usage:
#   docker run --rm --name debezium-oracle \
#     -p 8765:8765 \
#     -v $(pwd)/debezium/oracle.properties:/debezium/conf/application.properties \
#     debezium/server:3.0.0.Final
#
# Oracle prerequisites (run as SYSDBA):
#   -- Enable archivelog mode (requires restart):
#   SHUTDOWN IMMEDIATE;
#   STARTUP MOUNT;
#   ALTER DATABASE ARCHIVELOG;
#   ALTER DATABASE OPEN;
#
#   -- Enable supplemental logging (required for UPDATE/DELETE before-images):
#   ALTER DATABASE ADD SUPPLEMENTAL LOG DATA;
#   ALTER DATABASE ADD SUPPLEMENTAL LOG DATA (ALL) COLUMNS;
#
#   -- Create a dedicated LogMiner user (CDB/multitenant syntax shown):
#   CREATE USER c##dbzuser IDENTIFIED BY dbzpass
#     DEFAULT TABLESPACE users QUOTA UNLIMITED ON users
#     CONTAINER=ALL;
#   GRANT CREATE SESSION                  TO c##dbzuser CONTAINER=ALL;
#   GRANT LOGMINING                       TO c##dbzuser CONTAINER=ALL;
#   GRANT SELECT ON V_$DATABASE           TO c##dbzuser CONTAINER=ALL;
#   GRANT SELECT ON V_$LOG                TO c##dbzuser CONTAINER=ALL;
#   GRANT SELECT ON V_$LOGFILE            TO c##dbzuser CONTAINER=ALL;
#   GRANT SELECT ON V_$LOGMNR_CONTENTS    TO c##dbzuser CONTAINER=ALL;
#   GRANT SELECT ON V_$LOGMNR_PARAMETERS  TO c##dbzuser CONTAINER=ALL;
#   GRANT SELECT ON V_$ARCHIVED_LOG       TO c##dbzuser CONTAINER=ALL;
#   GRANT SELECT ON V_$TRANSACTION        TO c##dbzuser CONTAINER=ALL;
#   GRANT SELECT_CATALOG_ROLE             TO c##dbzuser CONTAINER=ALL;
#   GRANT EXECUTE ON DBMS_LOGMNR          TO c##dbzuser CONTAINER=ALL;
#   GRANT EXECUTE ON DBMS_LOGMNR_D        TO c##dbzuser CONTAINER=ALL;
#   -- Grant SELECT on each table you want to capture:
#   GRANT SELECT ON HR.EMPLOYEES          TO c##dbzuser;
#   GRANT SELECT ON HR.DEPARTMENTS        TO c##dbzuser;
# ─────────────────────────────────────────────────────────────────────────────

# ── Debezium Server sink — HTTP to the CDC daemon ─────────────────────────────
debezium.sink.type=http

# Format (required by Debezium 2.6+)
debezium.format.value=json
debezium.format.key=json
# URL of the CDC daemon's Debezium adapter listener.
# Use host.docker.internal when Debezium Server runs in Docker on the same machine.
debezium.sink.http.url=http://host.docker.internal:8765/events
debezium.sink.http.timeout.ms=5000
debezium.sink.http.retries=3

# ── Source connector ──────────────────────────────────────────────────────────
debezium.source.connector.class=io.debezium.connector.oracle.OracleConnector
debezium.source.name=oracle-cdc
debezium.source.topic.prefix=oracle-cdc

# ── Database connection ───────────────────────────────────────────────────────
debezium.source.database.hostname=YOUR_ORACLE_HOST
debezium.source.database.port=1521
debezium.source.database.user=c##dbzuser
debezium.source.database.password=dbzpass
# For non-CDB (traditional): set database.dbname and remove database.pdb.name
debezium.source.database.dbname=ORCLCDB
debezium.source.database.pdb.name=ORCLPDB1
debezium.source.database.connection.adapter=logminer

# ── Tables to capture (schema.table, comma-separated) ─────────────────────────
debezium.source.table.include.list=HR.EMPLOYEES,HR.DEPARTMENTS

# ── Snapshot behaviour ────────────────────────────────────────────────────────
# "initial" = full table snapshot on first run, then switch to streaming.
# "schema_only" = skip data snapshot, stream from current SCN only.
# "never" = assume tables already exist in the target, stream only.
debezium.source.snapshot.mode=initial

# ── Offset storage — local file (swap for Kafka/Redis in production) ──────────
debezium.source.offset.storage=org.apache.kafka.connect.storage.FileOffsetBackingStore
debezium.source.offset.storage.file.filename=/debezium/data/oracle-offsets.dat
debezium.source.offset.flush.interval.ms=10000

# ── Schema history — required by Oracle connector ─────────────────────────────
debezium.source.schema.history.internal=io.debezium.storage.file.history.FileSchemaHistory
debezium.source.schema.history.internal.file.filename=/debezium/data/oracle-schema-history.dat

# ── LogMiner tuning ───────────────────────────────────────────────────────────
# How many SCNs to mine per batch. Lower = less memory, higher latency.
debezium.source.log.mining.batch.size.max=20000
# Mine sessions longer than this (ms) before committing offset.
debezium.source.log.mining.sleep.time.max.ms=3000
# Use online redo logs first (lower latency), fall back to archive logs.
debezium.source.log.mining.strategy=online_catalog

# ── Tombstones & deletes ──────────────────────────────────────────────────────
# Set to false so the HTTP sink receives a single DELETE event (no null tombstone).
debezium.source.tombstones.on.delete=false

# ── Payload format ────────────────────────────────────────────────────────────
# Include full before-image on UPDATE/DELETE (requires supplemental logging above).
debezium.source.before.state.propagation=false
debezium.transforms=unwrap
debezium.transforms.unwrap.type=io.debezium.transforms.ExtractNewRecordState
debezium.transforms.unwrap.add.fields=op,source.ts_ms,source.scn
debezium.transforms.unwrap.delete.handling.mode=rewrite
debezium.transforms.unwrap.drop.tombstones=true

# ── Heartbeat (keeps offsets moving even during quiet periods) ────────────────
debezium.source.heartbeat.interval.ms=30000
