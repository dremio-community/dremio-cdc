# ─────────────────────────────────────────────────────────────────────────────
# Debezium Server — IBM Db2 connector
# ─────────────────────────────────────────────────────────────────────────────
# Usage:
#   docker run --rm --name debezium-db2 \
#     -p 8767:8767 \
#     -v $(pwd)/debezium/db2.properties:/debezium/conf/application.properties \
#     debezium/server:3.0.0.Final
#
# Db2 prerequisites:
#   -- Enable ASN Capture (run as db2inst1 or SYSADM):
#   db2 "UPDATE DATABASE CONFIGURATION FOR mydb USING LOGARCHMETH1 LOGRETAIN"
#   db2 "UPDATE DATABASE CONFIGURATION FOR mydb USING TRACKMOD YES"
#   db2 "BACKUP DATABASE mydb"   -- required after enabling TRACKMOD
#
#   -- Enable CDC for each table (using the Db2 ASNCLP tool or SQL):
#   -- ASNCLP is the recommended approach; example SQL:
#   CALL ASNADD_TABLE_TO_CAPTURE('SCHEMA', 'TABLE', 'FULL');
#
#   -- Grant privileges:
#   GRANT DBADM ON DATABASE TO USER dbzuser;
# ─────────────────────────────────────────────────────────────────────────────

debezium.sink.type=http

# Format (required by Debezium 2.6+)
debezium.format.value=json
debezium.format.key=json
debezium.sink.http.url=http://host.docker.internal:8767/events
debezium.sink.http.timeout.ms=5000
debezium.sink.http.retries=3

debezium.source.connector.class=io.debezium.connector.db2.Db2Connector
debezium.source.name=db2-cdc
debezium.source.topic.prefix=db2-cdc

debezium.source.database.hostname=YOUR_DB2_HOST
debezium.source.database.port=50000
debezium.source.database.user=dbzuser
debezium.source.database.password=YOUR_DB2_PASSWORD
debezium.source.database.dbname=MYDB

debezium.source.table.include.list=MYSCHEMA.CUSTOMERS,MYSCHEMA.ORDERS

debezium.source.snapshot.mode=initial

debezium.source.offset.storage=org.apache.kafka.connect.storage.FileOffsetBackingStore
debezium.source.offset.storage.file.filename=/debezium/data/db2-offsets.dat
debezium.source.offset.flush.interval.ms=10000

debezium.source.schema.history.internal=io.debezium.storage.file.history.FileSchemaHistory
debezium.source.schema.history.internal.file.filename=/debezium/data/db2-schema-history.dat

debezium.source.tombstones.on.delete=false
debezium.source.heartbeat.interval.ms=30000
